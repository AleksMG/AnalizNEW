#btnReset { background: #e17055; color: white; }
#btn3v3 { background: #6c5ce7; color: white; }
#btn5v5 { background: #a29bfe; color: white; }
#btnSpeed { background: #00cec9; color: white; }
.active-mode { outline: 3px solid #ffd93d; outline-offset: 2px; }
#canvasContainer {
    position: relative;
    margin: 10px;
}
canvas {
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#stats {
    display: flex;
    gap: 30px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    margin: 10px;
    font-size: 13px;
    flex-wrap: wrap;
    justify-content: center;

.stat-item { text-align: center; }
.stat-label { color: #888; font-size: 11px; text-transform: uppercase; }
.stat-value { font-size: 20px; font-weight: bold; }
#neuralInfo {
    font-size: 12px;
    color: #888;
    padding: 5px;
    text-align: center;
}
#eventLog {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffd93d;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    pointer-events: none;
    transition: opacity 0.5s;
    z-index: 10;
}
</style>

<div id="neuralInfo">Neural Network: Each player has a multi-layer transformer-inspired network (~350 neurons) with attention mechanisms</div>

<script>
// ==================== NEURAL NETWORK ====================
class Matrix {
    constructor(rows, cols) {
        this.rows = rows;
        this.cols = cols;
        this.data = new Float32Array(rows * cols);
    }
    static random(rows, cols, scale = 1) {
        const m = new Matrix(rows, cols);
        const s = scale * Math.sqrt(2.0 / (rows + cols));
        for (let i = 0; i < m.data.length; i++) {
            m.data[i] = (Math.random() * 2 - 1) * s;
        }
        return m;
    }
    get(r, c) { return this.data[r * this.cols + c]; }
    set(r, c, v) { this.data[r * this.cols + c] = v; }
}

function matMul(a, aRows, aCols, b, bCols, out) {
    for (let i = 0; i < aRows; i++) {
        for (let j = 0; j < bCols; j++) {
            let sum = 0;
            for (let k = 0; k < aCols; k++) {
                sum += a[i * aCols + k] * b[k * bCols + j];
            }
            out[i * bCols + j] = sum;
        }
    }
}

function addBias(out, bias, rows, cols) {
    for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
            out[i * cols + j] += bias[j];
        }
    }
}

function gelu(x) {
    return 0.5 * x * (1 + Math.tanh(Math.sqrt(2 / Math.PI) * (x + 0.044715 * x * x * x)));
}

function softmax(arr, offset, len) {
    let max = -Infinity;
    for (let i = 0; i < len; i++) max = Math.max(max, arr[offset + i]);
    let sum = 0;
    for (let i = 0; i < len; i++) {
        arr[offset + i] = Math.exp(arr[offset + i] - max);
        sum += arr[offset + i];
    }
    for (let i = 0; i < len; i++) arr[offset + i] /= sum;
}

function layerNorm(arr, offset, size, gamma, beta) {
    let mean = 0;
    for (let i = 0; i < size; i++) mean += arr[offset + i];
    mean /= size;
    let variance = 0;
    for (let i = 0; i < size; i++) variance += (arr[offset + i] - mean) ** 2;
    variance /= size;
    const std = Math.sqrt(variance + 1e-5);
    for (let i = 0; i < size; i++) {
        arr[offset + i] = gamma[i] * ((arr[offset + i] - mean) / std) + beta[i];
    }
}

// Transformer-inspired neural network for each player
// Input: ~24 features -> Embedding(32) -> 2x TransformerBlock(32, 2 heads) -> Output(8)
// Total neurons: embed(32) + attn1(32*3*2=192 QKV + 32 out) + ff1(64+32) + attn2(same) + ff2(same) + output ≈ 350+ neurons
class PlayerBrain {
    constructor() {
        const D = 32; // model dimension
        const H = 2;  // attention heads
        const FF = 64; // feedforward hidden
        const INPUT = 24;
        const OUTPUT = 8;
        
        this.D = D;
        this.H = H;
        this.FF = FF;
        this.INPUT = INPUT;
        this.OUTPUT = OUTPUT;
        this.headDim = D / H;
        
        // Input embedding
        this.We = Matrix.random(INPUT, D).data;
        this.be = new Float32Array(D);
        
        // Transformer Block 1
        this.Wq1 = Matrix.random(D, D).data;
        this.Wk1 = Matrix.random(D, D).data;
        this.Wv1 = Matrix.random(D, D).data;
        this.Wo1 = Matrix.random(D, D).data;
        this.bq1 = new Float32Array(D);
        this.bk1 = new Float32Array(D);
        this.bv1 = new Float32Array(D);
        this.bo1 = new Float32Array(D);
        this.ln1g = new Float32Array(D).fill(1);
        this.ln1b = new Float32Array(D);
        this.Wff1a = Matrix.random(D, FF).data;
        this.bff1a = new Float32Array(FF);
        this.Wff1b = Matrix.random(FF, D).data;
        this.bff1b = new Float32Array(D);
        this.ln2g = new Float32Array(D).fill(1);
        this.ln2b = new Float32Array(D);
        
        // Transformer Block 2
        this.Wq2 = Matrix.random(D, D).data;
        this.Wk2 = Matrix.random(D, D).data;
        this.Wv2 = Matrix.random(D, D).data;
        this.Wo2 = Matrix.random(D, D).data;
        this.bq2 = new Float32Array(D);
        this.bk2 = new Float32Array(D);
        this.bv2 = new Float32Array(D);
        this.bo2 = new Float32Array(D);
        this.ln3g = new Float32Array(D).fill(1);
        this.ln3b = new Float32Array(D);
        this.Wff2a = Matrix.random(D, FF).data;
        this.bff2a = new Float32Array(FF);
        this.Wff2b = Matrix.random(FF, D).data;
        this.bff2b = new Float32Array(D);
        this.ln4g = new Float32Array(D).fill(1);
        this.ln4b = new Float32Array(D);
        
        // Output layer
        this.Wout = Matrix.random(D, OUTPUT).data;
        this.bout = new Float32Array(OUTPUT);
        
        // Preallocate buffers
        this.embedded = new Float32Array(D);
        this.q = new Float32Array(D);
        this.k = new Float32Array(D);
        this.v = new Float32Array(D);
        this.attnOut = new Float32Array(D);
        this.attnScores = new Float32Array(H);
        this.ffHidden = new Float32Array(FF);
        this.residual = new Float32Array(D);
        this.output = new Float32Array(OUTPUT);
        
        this.totalNeurons = INPUT + D + D*3*2 + D*2 + FF*2 + D*2 + OUTPUT;
    }
    
    selfAttention(x, Wq, Wk, Wv, Wo, bq, bk, bv, bo) {
        const D = this.D, H = this.H, hd = this.headDim;
        
        // Compute Q, K, V
        matMul(x, 1, D, Wq, D, this.q); addBias(this.q, bq, 1, D);
        matMul(x, 1, D, Wk, D, this.k); addBias(this.k, bk, 1, D);
        matMul(x, 1, D, Wv, D, this.v); addBias(this.v, bv, 1, D);
        
        // Multi-head attention (self-attention with single token, so it's essentially a learned projection)
        // But we treat the D dimensions as H heads attending to themselves
        const tempOut = new Float32Array(D);
        for (let h = 0; h < H; h++) {
            const offset = h * hd;
            let score = 0;
            for (let i = 0; i < hd; i++) {
                score += this.q[offset + i] * this.k[offset + i];
            }
            score /= Math.sqrt(hd);
            const attnWeight = 1.0; // Single token self-attention = 1 after softmax
            for (let i = 0; i < hd; i++) {
                tempOut[offset + i] = attnWeight * this.v[offset + i];
            }
        }
        
        // Output projection
        matMul(tempOut, 1, D, Wo, D, this.attnOut);
        addBias(this.attnOut, bo, 1, D);
    }
    
    feedForward(x, Wa, ba, Wb, bb) {
        const D = this.D, FF = this.FF;
        matMul(x, 1, D, Wa, FF, this.ffHidden);
        addBias(this.ffHidden, ba, 1, FF);
        for (let i = 0; i < FF; i++) this.ffHidden[i] = gelu(this.ffHidden[i]);
        const ffOut = new Float32Array(D);
        matMul(this.ffHidden, 1, FF, Wb, D, ffOut);
        addBias(ffOut, bb, 1, D);
        return ffOut;
    }
    
    forward(input) {
        const D = this.D;
        
        // Input embedding
        matMul(input, 1, this.INPUT, this.We, D, this.embedded);
        addBias(this.embedded, this.be, 1, D);
        for (let i = 0; i < D; i++) this.embedded[i] = gelu(this.embedded[i]);
        
        let x = new Float32Array(this.embedded);
        
        // Transformer Block 1
        // Self-attention + residual
        for (let i = 0; i < D; i++) this.residual[i] = x[i];
        this.selfAttention(x, this.Wq1, this.Wk1, this.Wv1, this.Wo1,
                          this.bq1, this.bk1, this.bv1, this.bo1);
        for (let i = 0; i < D; i++) x[i] = this.residual[i] + this.attnOut[i];
        layerNorm(x, 0, D, this.ln1g, this.ln1b);
        
        // Feedforward + residual
        for (let i = 0; i < D; i++) this.residual[i] = x[i];
        const ff1 = this.feedForward(x, this.Wff1a, this.bff1a, this.Wff1b, this.bff1b);
        for (let i = 0; i < D; i++) x[i] = this.residual[i] + ff1[i];
        layerNorm(x, 0, D, this.ln2g, this.ln2b);
        
        // Transformer Block 2
        for (let i = 0; i < D; i++) this.residual[i] = x[i];
        this.selfAttention(x, this.Wq2, this.Wk2, this.Wv2, this.Wo2,
                          this.bq2, this.bk2, this.bv2, this.bo2);
        for (let i = 0; i < D; i++) x[i] = this.residual[i] + this.attnOut[i];
        layerNorm(x, 0, D, this.ln3g, this.ln3b);
        
        for (let i = 0; i < D; i++) this.residual[i] = x[i];
        const ff2 = this.feedForward(x, this.Wff2a, this.bff2a, this.Wff2b, this.bff2b);
        for (let i = 0; i < D; i++) x[i] = this.residual[i] + ff2[i];
        layerNorm(x, 0, D, this.ln4g, this.ln4b);
        
        // Output
        matMul(x, 1, D, this.Wout, this.OUTPUT, this.output);
        addBias(this.output, this.bout, 1, this.OUTPUT);
        
        // Output: [moveX, moveY, kickPowerX, kickPowerY, passDesire, shootDesire, defendDesire, interceptDesire]
        // Apply tanh for bounded outputs
        for (let i = 0; i < this.OUTPUT; i++) {
            this.output[i] = Math.tanh(this.output[i]);
        }
        
        return this.output;
    }
    
    // Simple evolutionary mutation for learning
    mutate(rate = 0.05) {
        const mutateArr = (arr) => {
            for (let i = 0; i < arr.length; i++) {
                if (Math.random() < rate) {
                    arr[i] += (Math.random() * 2 - 1) * 0.3;
                }
            }
        };
        mutateArr(this.We); mutateArr(this.be);
        mutateArr(this.Wq1); mutateArr(this.Wk1); mutateArr(this.Wv1); mutateArr(this.Wo1);
        mutateArr(this.Wff1a); mutateArr(this.bff1a); mutateArr(this.Wff1b); mutateArr(this.bff1b);
        mutateArr(this.Wq2); mutateArr(this.Wk2); mutateArr(this.Wv2); mutateArr(this.Wo2);
        mutateArr(this.Wff2a); mutateArr(this.bff2a); mutateArr(this.Wff2b); mutateArr(this.bff2b);
        mutateArr(this.Wout); mutateArr(this.bout);
    }
}

// ==================== GAME ENGINE ====================
const canvas = document.getElementById('field');
const ctx = canvas.getContext('2d');

// Field dimensions
const W = 900, H = 560;
canvas.width = W;
canvas.height = H;

const GOAL_WIDTH = 100;
const GOAL_DEPTH = 30;
const GOAL_TOP = (H - GOAL_WIDTH) / 2;
const GOAL_BOTTOM = GOAL_TOP + GOAL_WIDTH;

// Game state
let gameState = {
    mode: 3,
    running: false,
    paused: false,
    speed: 1,
    scoreRed: 0,
    scoreBlue: 0,
    time: 0,
    maxTime: 90 * 60, // 90 seconds game = ~90 minutes in sim
    passesRed: 0,
    passesBlue: 0,
    shotsRed: 0,
    shotsBlue: 0,
    possessionRed: 0,
    possessionBlue: 0,
    possessionFrames: 0,
    lastEvent: '',
    eventTimer: 0,
    goalAnimation: 0,
    goalTeam: '',
};

let ball = { x: W/2, y: H/2, vx: 0, vy: 0, radius: 6, owner: null, lastTouch: null };
let players = [];
let animationId = null;

const PLAYER_RADIUS = 12;
const PLAYER_SPEED = 2.5;
const BALL_FRICTION = 0.985;
const PLAYER_FRICTION = 0.9;
const KICK_POWER = 8;
const PASS_POWER = 6;
const SHOOT_POWER = 10;
const MAX_BALL_SPEED = 12;
const TACKLE_DISTANCE = 20;

// Roles: GK=0, DEF=1, MID=2, FWD=3
const FORMATIONS = {
    3: {
        red: [
            { role: 0, baseX: 50, baseY: H/2 },   // GK
            { role: 1, baseX: 180, baseY: H/3 },   // DEF
            { role: 3, baseX: 320, baseY: 2*H/3 }, // FWD
        ],
        blue: [
            { role: 0, baseX: W-50, baseY: H/2 },
            { role: 1, baseX: W-180, baseY: 2*H/3 },
            { role: 3, baseX: W-320, baseY: H/3 },
        ]
    },
    5: {
        red: [
            { role: 0, baseX: 50, baseY: H/2 },       // GK
            { role: 1, baseX: 160, baseY: H/4 },       // DEF
            { role: 1, baseX: 160, baseY: 3*H/4 },     // DEF
            { role: 2, baseX: 300, baseY: H/2 },       // MID
            { role: 3, baseX: 380, baseY: H/3 },       // FWD
        ],
        blue: [
            { role: 0, baseX: W-50, baseY: H/2 },
            { role: 1, baseX: W-160, baseY: 3*H/4 },
            { role: 1, baseX: W-160, baseY: H/4 },
            { role: 2, baseX: W-300, baseY: H/2 },
            { role: 3, baseX: W-380, baseY: 2*H/3 },
        ]
    }
};

const ROLE_NAMES = ['GK', 'DEF', 'MID', 'FWD'];

class Player {
    constructor(team, index, role, baseX, baseY) {
        this.team = team; // 'red' or 'blue'
        this.index = index;
        this.role = role;
        this.baseX = baseX;
        this.baseY = baseY;
        this.x = baseX;
        this.y = baseY;
        this.vx = 0;
        this.vy = 0;
        this.radius = PLAYER_RADIUS;
        this.brain = new PlayerBrain();
        this.hasBall = false;
        this.kickCooldown = 0;
        this.energy = 1.0;
        this.sprintTimer = 0;
        
        // Pre-train brain with role-specific biases
        this.initializeBrain();
    }
    
    initializeBrain() {
        // Give role-specific output biases for smarter initial behavior
        const b = this.brain.bout;
        if (this.role === 0) { // GK - stay back, defend
            b[6] = 0.5; // defend desire
            b[7] = 0.3; // intercept
        } else if (this.role === 1) { // DEF
            b[6] = 0.3;
            b[4] = 0.2; // pass desire
        } else if (this.role === 2) { // MID
            b[4] = 0.3; // pass
            b[2] = 0.1; // some kick
        } else if (this.role === 3) { // FWD
            b[5] = 0.4; // shoot desire
            b[2] = 0.2; // kick power
        }
        
        // Mutate slightly for variety
        this.brain.mutate(0.1);
    }
    
    buildInput() {
        const input = new Float32Array(24);
        const norm = (v, max) => v / max;
        const attackDir = this.team === 'red' ? 1 : -1;
        
        // Self position (0-1)
        input[0] = norm(this.x, W);
        input[1] = norm(this.y, H);
        
        // Ball position relative
        input[2] = norm(ball.x - this.x, W);
        input[3] = norm(ball.y - this.y, H);
        
        // Ball velocity
        input[4] = norm(ball.vx, MAX_BALL_SPEED);
        input[5] = norm(ball.vy, MAX_BALL_SPEED);
        
        // Goal to attack (relative)
        const goalX = this.team === 'red' ? W : 0;
        const goalY = H / 2;
        input[6] = norm(goalX - this.x, W);
        input[7] = norm(goalY - this.y, H);
        
        // Own goal (relative)
        const ownGoalX = this.team === 'red' ? 0 : W;
        input[8] = norm(ownGoalX - this.x, W);
        input[9] = norm(goalY - this.y, H);
        
        // Has ball
        input[10] = this.hasBall ? 1 : 0;
        
        // Ball distance
        const bdx = ball.x - this.x, bdy = ball.y - this.y;
        input[11] = norm(Math.sqrt(bdx*bdx + bdy*bdy), W);
        
        // Nearest teammate relative
        let nearestTeam = null, nearestTeamDist = Infinity;
        let nearestOpp = null, nearestOppDist = Infinity;
        for (const p of players) {
            if (p === this) continue;
            const dx = p.x - this.x, dy = p.y - this.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (p.team === this.team) {
                if (d < nearestTeamDist) { nearestTeamDist = d; nearestTeam = p; }
            } else {
                if (d < nearestOppDist) { nearestOppDist = d; nearestOpp = p; }
            }
        }
        
        if (nearestTeam) {
            input[12] = norm(nearestTeam.x - this.x, W);
            input[13] = norm(nearestTeam.y - this.y, H);
        }
        if (nearestOpp) {
            input[14] = norm(nearestOpp.x - this.x, W);
            input[15] = norm(nearestOpp.y - this.y, H);
        }
        
        // Role encoding
        input[16] = this.role / 3;
        
        // Attack direction
        input[17] = attackDir;
        
        // Base position relative
        input[18] = norm(this.baseX - this.x, W);
        input[19] = norm(this.baseY - this.y, H);
        
        // Ball owner info
        input[20] = ball.owner && ball.owner.team === this.team ? 1 : (ball.owner ? -1 : 0);
        
        // Energy
        input[21] = this.energy;
        
        // Distance to own goal
        input[22] = norm(Math.sqrt((ownGoalX-ball.x)**2 + (goalY-ball.y)**2), W);
        
        // Score difference
        const sd = this.team === 'red' ? gameState.scoreRed - gameState.scoreBlue : gameState.scoreBlue - gameState.scoreRed;
        input[23] = Math.tanh(sd / 3);
        
        return input;
    }
    
    think() {
        const input = this.buildInput();
        const output = this.brain.forward(input);
        return output;
    }
    
    update() {
        if (this.kickCooldown > 0) this.kickCooldown--;
        
        const output = this.think();
        
        let moveX = output[0];
        let moveY = output[1];
        let kickPowerX = output[2];
        let kickPowerY = output[3];
        let passDesire = (output[4] + 1) / 2; // 0-1
        let shootDesire = (output[5] + 1) / 2;
        let defendDesire = (output[6] + 1) / 2;
        let interceptDesire = (output[7] + 1) / 2;
        
        const attackDir = this.team === 'red' ? 1 : -1;
        const goalX = this.team === 'red' ? W - 15 : 15;
        const goalY = H / 2;
        const ownGoalX = this.team === 'red' ? 15 : W - 15;
        
        const toBallDx = ball.x - this.x;
        const toBallDy = ball.y - this.y;
        const toBallDist = Math.sqrt(toBallDx*toBallDx + toBallDy*toBallDy);
        
        // Behavioral layer on top of neural network
        let targetX = this.x + moveX * PLAYER_SPEED * 3;
        let targetY = this.y + moveY * PLAYER_SPEED * 3;
        
        if (this.hasBall) {
            // Has ball: decide shoot, pass, or dribble
            const toGoalDx = goalX - this.x;
            const toGoalDy = goalY - this.y;
            const toGoalDist = Math.sqrt(toGoalDx*toGoalDx + toGoalDy*toGoalDy);
            
            if (this.kickCooldown <= 0) {
                // Find best pass target
                let bestPassTarget = null;
                let bestPassScore = -Infinity;
                
                for (const p of players) {
                    if (p === this || p.team !== this.team) continue;
                    const dx = p.x - this.x;
                    const dy = p.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    // Score based on: closer to goal, open space, not too close
                    let pGoalDist = Math.sqrt((goalX - p.x)**2 + (goalY - p.y)**2);
                    let score = (toGoalDist - pGoalDist) / W; // prefer forward passes
                    score += (dist > 80 && dist < 350) ? 0.3 : -0.1;
                    
                    // Check if pass lane is open
                    let laneOpen = true;
                    for (const opp of players) {
                        if (opp.team === this.team) continue;
                        const oppDist = pointToLineDist(this.x, this.y, p.x, p.y, opp.x, opp.y);
                        if (oppDist < 30 && Math.sqrt((opp.x-this.x)**2+(opp.y-this.y)**2) < dist) {
                            laneOpen = false;
                            break;
                        }
                    }
                    if (laneOpen) score += 0.3;
                    
                    if (score > bestPassScore) {
                        bestPassScore = score;
                        bestPassTarget = p;
                    }
                }
                
                // Shoot if close to goal and shoot desire is high
                if (toGoalDist < 250 && shootDesire > 0.3) {
                    const power = SHOOT_POWER * (0.7 + shootDesire * 0.3);
                    const angle = Math.atan2(toGoalDy, toGoalDx);
                    // Add some randomness to aim
                    const aimOffset = (Math.random() - 0.5) * 0.3;
                    ball.vx = Math.cos(angle + aimOffset) * power;
                    ball.vy = Math.sin(angle + aimOffset) * power;
                    ball.owner = null;
                    this.hasBall = false;
                    this.kickCooldown = 15;
                    if (this.team === 'red') gameState.shotsRed++;
                    else gameState.shotsBlue++;
                    showEvent(`${this.team === 'red' ? '🔴' : '🔵'} SHOT by ${ROLE_NAMES[this.role]}!`);
                }
                // Pass if desire is high and there's a good target
                else if (passDesire > 0.4 && bestPassTarget) {
                    const dx = bestPassTarget.x - this.x;
                    const dy = bestPassTarget.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const power = Math.min(PASS_POWER, dist / 20);
                    // Lead the pass slightly
                    const leadX = bestPassTarget.x + bestPassTarget.vx * 10;
                    const leadY = bestPassTarget.y + bestPassTarget.vy * 10;
                    const angle = Math.atan2(leadY - this.y, leadX - this.x);
                    ball.vx = Math.cos(angle) * power;
                    ball.vy = Math.sin(angle) * power;
                    ball.owner = null;
                    this.hasBall = false;
                    this.kickCooldown = 10;
                    ball.lastTouch = this;
                    if (this.team === 'red') gameState.passesRed++;
                    else gameState.passesBlue++;
                }
                // Dribble towards goal
                else {
                    targetX = this.x + attackDir * 3;
                    targetY = this.y + moveY * 2;
                    
                    // Avoid nearest opponent
                    let nearestOppDist = Infinity, nearestOpp = null;
                    for (const p of players) {
                        if (p.team === this.team) continue;
                        const d = Math.sqrt((p.x-this.x)**2 + (p.y-this.y)**2);
                        if (d < nearestOppDist) { nearestOppDist = d; nearestOpp = p; }
                    }
                    if (nearestOpp && nearestOppDist < 60) {
                        const avoidAngle = Math.atan2(this.y - nearestOpp.y, this.x - nearestOpp.x);
                        targetX = this.x + Math.cos(avoidAngle + attackDir * 0.5) * 3;
                        targetY = this.y + Math.sin(avoidAngle + attackDir * 0.5) * 3;
                    }
                }
            }
        } else {
            // Doesn't have ball
            const teamHasBall = ball.owner && ball.owner.team === this.team;
            
            if (teamHasBall) {
                // Support play - get into good position
                if (this.role === 0) {
                    // GK stays near own goal
                    targetX = this.baseX + (ball.x - W/2) * 0.1;
                    targetY = this.baseY + (ball.y - H/2) * 0.3;
                } else if (this.role === 1) {
                    // DEF holds position, slightly forward
                    targetX = this.baseX + attackDir * 40;
                    targetY = this.baseY + (ball.y - this.baseY) * 0.3;
                } else if (this.role === 2) {
                    // MID moves to support
                    targetX = ball.x - attackDir * 80 + moveX * 40;
                    targetY = ball.y + moveY * 80;
                } else {
                    // FWD makes runs
                    targetX = ball.x + attackDir * 100 + moveX * 50;
                    targetY = goalY + (this.baseY - goalY) * 0.5 + moveY * 80;
                }
                
                // Make space - avoid clustering with teammates
                for (const p of players) {
                    if (p === this || p.team !== this.team) continue;
                    const dx = this.x - p.x, dy = this.y - p.y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 50 && d > 0) {
                        targetX += (dx/d) * 2;
                        targetY += (dy/d) * 2;
                    }
                }
            } else {
                // Opponent has ball or loose ball
                if (this.role === 0) {
                    // GK positions between ball and goal
                    const gbx = ownGoalX + (ball.x - ownGoalX) * 0.15;
                    const gby = H/2 + (ball.y - H/2) * 0.5;
                    targetX = gbx;
                    targetY = gby;
                    
                    // GK intercepts if ball is very close to goal
                    if (Math.abs(ball.x - ownGoalX) < 100) {
                        targetX = ball.x;
                        targetY = ball.y;
                    }
                } else if (defendDesire > 0.3 || toBallDist < 150) {
                    // Go for the ball
                    targetX = ball.x + ball.vx * 5;
                    targetY = ball.y + ball.vy * 5;
                } else {
                    // Return to formation with offset towards ball
                    targetX = this.baseX + (ball.x - W/2) * 0.2;
                    targetY = this.baseY + (ball.y - H/2) * 0.2;
                }
            }
        }
        
        // Move towards target
        const dx = targetX - this.x;
        const dy = targetY - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        let speed = PLAYER_SPEED;
        if (this.role === 0 && Math.abs(this.x - ownGoalX) < 100) speed *= 1.2; // GK faster near goal
        if (dist > 5) {
            speed *= Math.min(1, this.energy);
            this.vx += (dx / dist) * speed * 0.3;
            this.vy += (dy / dist) * speed * 0.3;
        }
        
        // Apply velocity
        this.vx *= PLAYER_FRICTION;
        this.vy *= PLAYER_FRICTION;
        
        const spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
        if (spd > PLAYER_SPEED * 1.5) {
            this.vx = (this.vx / spd) * PLAYER_SPEED * 1.5;
            this.vy = (this.vy / spd) * PLAYER_SPEED * 1.5;
        }
        
        this.x += this.vx;
        this.y += this.vy;
        
        // Keep in bounds
        this.x = Math.max(this.radius, Math.min(W - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(H - this.radius, this.y));
        
        // GK restriction
        if (this.role === 0) {
            if (this.team === 'red') {
                this.x = Math.min(this.x, 150);
            } else {
                this.x = Math.max(this.x, W - 150);
            }
        }
        
        // Energy management
        if (spd > PLAYER_SPEED * 0.8) {
            this.energy = Math.max(0.3, this.energy - 0.0005);
        } else {
            this.energy = Math.min(1, this.energy + 0.001);
        }
        
        // Ball pickup / tackle
        if (!this.hasBall && this.kickCooldown <= 0) {
            if (toBallDist < this.radius + ball.radius + 5) {
                if (!ball.owner || ball.owner.team !== this.team) {
                    if (ball.owner) {
                        // Tackle
                        ball.owner.hasBall = false;
                        showEvent(`${this.team === 'red' ? '🔴' : '🔵'} Tackle by ${ROLE_NAMES[this.role]}!`);
                    }
                    ball.owner = this;
                    this.hasBall = true;
                    ball.lastTouch = this;
                    ball.vx = 0;
                    ball.vy = 0;
                }
            }
        }
        
        // Move ball with player if has it
        if (this.hasBall) {
            ball.x = this.x + (this.vx > 0 ? 1 : -1) * (this.radius + ball.radius);
            ball.y = this.y + this.vy * 0.5;
            ball.vx = this.vx;
            ball.vy = this.vy;
        }
    }
}

function pointToLineDist(x1, y1, x2, y2, px, py) {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx*dx + dy*dy;
    if (len2 === 0) return Math.sqrt((px-x1)**2 + (py-y1)**2);
    let t = ((px-x1)*dx + (py-y1)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const projX = x1 + t * dx, projY = y1 + t * dy;
    return Math.sqrt((px-projX)**2 + (py-projY)**2);
}

function showEvent(text) {
    gameState.lastEvent = text;
    gameState.eventTimer = 120;
    document.getElementById('eventLog').textContent = text;
    document.getElementById('eventLog').style.opacity = '1';
}

function createPlayers() {
    players = [];
    const formation = FORMATIONS[gameState.mode];
    
    formation.red.forEach((pos, i) => {
        players.push(new Player('red', i, pos.role, pos.baseX, pos.baseY));
    });
    
    formation.blue.forEach((pos, i) => {
        players.push(new Player('blue', i, pos.role, pos.baseX, pos.baseY));
    });
}

function resetBall(centerKick = true) {
    ball.x = W / 2;
    ball.y = H / 2;
    ball.vx = centerKick ? (Math.random() > 0.5 ? 2 : -2) : 0;
    ball.vy = centerKick ? (Math.random() - 0.5) * 2 : 0;
    ball.owner = null;
    
    for (const p of players) {
        p.hasBall = false;
        p.x = p.baseX;
        p.y = p.baseY;
        p.vx = 0;
        p.vy = 0;
    }
}

function checkGoal() {
    // Left goal (Blue scores)
    if (ball.x <= GOAL_DEPTH + ball.radius && ball.y > GOAL_TOP && ball.y < GOAL_BOTTOM) {
        gameState.scoreBlue++;
        gameState.goalAnimation = 60;
        gameState.goalTeam = 'blue';
        showEvent('⚽ GOOOAL! Blue FC scores!');
        document.getElementById('scoreBlue').textContent = gameState.scoreBlue;
        setTimeout(() => resetBall(true), 1000);
        return true;
    }
    // Right goal (Red scores)
    if (ball.x >= W - GOAL_DEPTH - ball.radius && ball.y > GOAL_TOP && ball.y < GOAL_BOTTOM) {
        gameState.scoreRed++;
        gameState.goalAnimation = 60;
        gameState.goalTeam = 'red';
        showEvent('⚽ GOOOAL! Red FC scores!');
        document.getElementById('scoreRed').textContent = gameState.scoreRed;
        setTimeout(() => resetBall(true), 1000);
        return true;
    }
    return false;
}

function updateBall() {
    if (ball.owner) return; // Ball controlled by player
    
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= BALL_FRICTION;
    ball.vy *= BALL_FRICTION;
    
    // Speed cap
    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    if (spd > MAX_BALL_SPEED) {
        ball.vx = (ball.vx / spd) * MAX_BALL_SPEED;
        ball.vy = (ball.vy / spd) * MAX_BALL_SPEED;
    }
    
    // Wall bounce
    if (ball.y <= ball.radius || ball.y >= H - ball.radius) {
        ball.vy *= -0.7;
        ball.y = Math.max(ball.radius, Math.min(H - ball.radius, ball.y));
    }
    
    // Side walls (except goal areas)
    if (ball.x <= ball.radius) {
        if (ball.y < GOAL_TOP || ball.y > GOAL_BOTTOM) {
            ball.vx *= -0.7;
            ball.x = ball.radius;
        }
    }
    if (ball.x >= W - ball.radius) {
        if (ball.y < GOAL_TOP || ball.y > GOAL_BOTTOM) {
            ball.vx *= -0.7;
            ball.x = W - ball.radius;
        }
    }
    
    // Goal posts bounce
    if (ball.x <= GOAL_DEPTH + ball.radius) {
        if (Math.abs(ball.y - GOAL_TOP) < 8 || Math.abs(ball.y - GOAL_BOTTOM) < 8) {
            ball.vx *= -0.8;
            ball.vy *= 0.8;
        }
    }
    if (ball.x >= W - GOAL_DEPTH - ball.radius) {
        if (Math.abs(ball.y - GOAL_TOP) < 8 || Math.abs(ball.y - GOAL_BOTTOM) < 8) {
            ball.vx *= -0.8;
            ball.vy *= 0.8;
        }
    }
    
    // Out of goal area bounds reset
    if (ball.x < -20 || ball.x > W + 20) {
        resetBall(false);
        ball.x = ball.x < 0 ? 80 : W - 80;
        ball.y = Math.max(50, Math.min(H - 50, ball.y));
    }
}

function handleCollisions() {
    for (let i = 0; i < players.length; i++) {
        for (let j = i + 1; j < players.length; j++) {
            const a = players[i], b = players[j];
            const dx = b.x - a.x, dy = b.y - a.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const minDist = a.radius + b.radius;
            
            if (dist < minDist && dist > 0) {
                const overlap = (minDist - dist) / 2;
                const nx = dx / dist, ny = dy / dist;
                a.x -= nx * overlap;
                a.y -= ny * overlap;
                b.x += nx * overlap;
                b.y += ny * overlap;
                
                // Velocity exchange
                const relVx = a.vx - b.vx;
                const relVy = a.vy - b.vy;
                const dot = relVx * nx + relVy * ny;
                a.vx -= dot * nx * 0.5;
                a.vy -= dot * ny * 0.5;
                b.vx += dot * nx * 0.5;
                b.vy += dot * ny * 0.5;
            }
        }
    }
}

// ==================== RENDERING ====================
function drawField() {
    // Green gradient field
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#2d8a4e');
    grad.addColorStop(0.5, '#34a85a');
    grad.addColorStop(1, '#2d8a4e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    // Field pattern (stripes)
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    for (let i = 0; i < W; i += 60) {
        if ((i / 60) % 2 === 0) {
            ctx.fillRect(i, 0, 60, H);
        }
    }
    
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    
    // Outer boundary
    ctx.strokeRect(10, 10, W-20, H-20);
    
    // Center line
    ctx.beginPath();
    ctx.moveTo(W/2, 10);
    ctx.lineTo(W/2, H-10);
    ctx.stroke();
    
    // Center circle
    ctx.beginPath();
    ctx.arc(W/2, H/2, 60, 0, Math.PI * 2);
    ctx.stroke();
    
    // Center dot
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(W/2, H/2, 4, 0, Math.PI * 2);
    ctx.fill();
    
    // Penalty areas
    ctx.strokeRect(10, H/2 - 100, 100, 200);
    ctx.strokeRect(W - 110, H/2 - 100, 100, 200);
    
    // Goal areas
    ctx.strokeRect(10, H/2 - 55, 45, 110);
    ctx.strokeRect(W - 55, H/2 - 55, 45, 110);
    
    // Penalty spots
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(80, H/2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(W - 80, H/2, 3, 0, Math.PI * 2);
    ctx.fill();
    
    // Goals
    drawGoal(0);
    drawGoal(W);
}

function drawGoal(x) {
    const isLeft = x === 0;
    const gx = isLeft ? 10 - GOAL_DEPTH : W - 10;
    const gw = GOAL_DEPTH;
    
    // Goal net
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(isLeft ? 10 - gw : W - 10, GOAL_TOP, gw, GOAL_WIDTH);
    
    // Goal net lines
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    for (let y = GOAL_TOP; y <= GOAL_BOTTOM; y += 10) {
        ctx.beginPath();
        ctx.moveTo(isLeft ? 10 - gw : W - 10, y);
        ctx.lineTo(isLeft ? 10 : W - 10 + gw, y);
        ctx.stroke();
    }
    
    // Goal posts
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(isLeft ? 10 : W - 10, GOAL_TOP);
    ctx.lineTo(isLeft ? 10 - gw : W - 10 + gw, GOAL_TOP);
    ctx.lineTo(isLeft ? 10 - gw : W - 10 + gw, GOAL_BOTTOM);
    ctx.lineTo(isLeft ? 10 : W - 10, GOAL_BOTTOM);
    ctx.stroke();
}

function drawPlayer(p) {
    const isRed = p.team === 'red';
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(p.x + 2, p.y + 4, p.radius, p.radius * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    const grad = ctx.createRadialGradient(p.x - 3, p.y - 3, 2, p.x, p.y, p.radius);
    if (isRed) {
        grad.addColorStop(0, '#ff8a8a');
        grad.addColorStop(1, '#cc3333');
    } else {
        grad.addColorStop(0, '#8ab4ff');
        grad.addColorStop(1, '#2266cc');
    }
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
    
    // Border
    ctx.strokeStyle = isRed ? '#aa2222' : '#1155aa';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Direction indicator
    const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    if (speed > 0.5) {
        const angle = Math.atan2(p.vy, p.vx);
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + Math.cos(angle) * (p.radius + 5), p.y + Math.sin(angle) * (p.radius + 5));
        ctx.stroke();
    }
    
    // Number/Role label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ROLE_NAMES[p.role], p.x, p.y);
    
    // Has ball indicator
    if (p.hasBall) {
        ctx.strokeStyle = '#ffd93d';
        ctx.lineWidth = 2;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius + 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    
    // Energy bar
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(p.x - 10, p.y - p.radius - 7, 20, 3);
    const eColor = p.energy > 0.6 ? '#00ff88' : p.energy > 0.3 ? '#ffaa00' : '#ff4444';
    ctx.fillStyle = eColor;
    ctx.fillRect(p.x - 10, p.y - p.radius - 7, 20 * p.energy, 3);
}

function drawBall() {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(ball.x + 2, ball.y + 3, ball.radius, ball.radius * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Ball
    const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.radius);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(1, '#cccccc');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // Ball speed trail
    const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
    if (spd > 3) {
        ctx.strokeStyle = `rgba(255,255,255,${Math.min(0.5, spd/15)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ball.x, ball.y);
        ctx.lineTo(ball.x - ball.vx * 3, ball.y - ball.vy * 3);
        ctx.stroke();
    }
}

function drawGoalAnimation() {
    if (gameState.goalAnimation > 0) {
        const alpha = gameState.goalAnimation / 60;
        ctx.fillStyle = `rgba(255, 215, 0, ${alpha * 0.3})`;
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.font = `bold ${60 + (60 - gameState.goalAnimation)}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GOAL!', W/2, H/2);
        
        gameState.goalAnimation--;
    }
}

function drawMinimap() {
    const mw = 120, mh = 75;
    const mx = W - mw - 15, my = H - mh - 15;
    
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(mx, my, mw, mh);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx, my, mw, mh);
    
    // Players on minimap
    for (const p of players) {
        ctx.fillStyle = p.team === 'red' ? '#ff6b6b' : '#74b9ff';
        ctx.beginPath();
        ctx.arc(mx + (p.x / W) * mw, my + (p.y / H) * mh, 2, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Ball on minimap
    ctx.fillStyle = '#ffd93d';
    ctx.beginPath();
    ctx.arc(mx + (ball.x / W) * mw, my + (ball.y / H) * mh, 2, 0, Math.PI * 2);
    ctx.fill();
}

// ==================== GAME LOOP ====================
function update() {
    if (!gameState.running || gameState.paused) return;
    
    for (let s = 0; s < gameState.speed; s++) {
        gameState.time++;
        
        // Update players
        for (const p of players) {
            p.update();
        }
        
        // Update ball
        updateBall();
        
        // Handle collisions
        handleCollisions();
        
        // Check goals
        checkGoal();
        
        // Possession tracking
        if (ball.owner) {
            gameState.possessionFrames++;
            if (ball.owner.team === 'red') gameState.possessionRed++;
            else gameState.possessionBlue++;
        }
        
        // Event log fade
        if (gameState.eventTimer > 0) {
            gameState.eventTimer--;
            if (gameState.eventTimer === 0) {
                document.getElementById('eventLog').style.opacity = '0';
            }
        }
        
        // End game
        if (gameState.time >= gameState.maxTime) {
            gameState.running = false;
            showEvent(`Full Time! Red ${gameState.scoreRed} - ${gameState.scoreBlue} Blue`);
        }
    }
}

function render() {
    drawField();
    
    // Draw players
    for (const p of players) {
        drawPlayer(p);
    }
    
    drawBall();
    drawGoalAnimation();
    drawMinimap();
    
    // Update UI
    const mins = Math.floor(gameState.time / 60);
    const secs = gameState.time % 60;
    document.getElementById('timer').textContent = 
        `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    
    // Stats
    document.getElementById('passesRed').textContent = gameState.passesRed;
    document.getElementById('passesBlue').textContent = gameState.passesBlue;
    document.getElementById('shotsRed').textContent = gameState.shotsRed;
    document.getElementById('shotsBlue').textContent = gameState.shotsBlue;
    
    if (gameState.possessionFrames > 0) {
        const pr = Math.round(gameState.possessionRed / gameState.possessionFrames * 100);
        document.getElementById('possRed').textContent = pr + '%';
        document.getElementById('possBlue').textContent = (100 - pr) + '%';
    }
}

function gameLoop() {
    update();
    render();
    animationId = requestAnimationFrame(gameLoop);
}

// ==================== CONTROLS ====================
function startGame() {
    if (!gameState.running) {
        gameState.running = true;
        gameState.paused = false;
        showEvent('Kick Off!');
    }
}

function togglePause() {
    gameState.paused = !gameState.paused;
    document.getElementById('btnPause').textContent = gameState.paused ? '▶ Resume' : '⏸ Pause';
    if (gameState.paused) showEvent('Paused');
}

function resetGame() {
    gameState.running = false;
    gameState.paused = false;
    gameState.scoreRed = 0;
    gameState.scoreBlue = 0;
    gameState.time = 0;
    gameState.passesRed = 0;
    gameState.passesBlue = 0;
    gameState.shotsRed = 0;
    gameState.shotsBlue = 0;
    gameState.possessionRed = 0;
    gameState.possessionBlue = 0;
    gameState.possessionFrames = 0;
    gameState.goalAnimation = 0;
    
    document.getElementById('scoreRed').textContent = '0';
    document.getElementById('scoreBlue').textContent = '0';
    document.getElementById('btnPause').textContent = '⏸ Pause';
    
    createPlayers();
    resetBall(false);
    showEvent('Game Reset');
}

function setMode(mode) {
    gameState.mode = mode;
    document.getElementById('btn3v3').classList.toggle('active-mode', mode === 3);
    document.getElementById('btn5v5').classList.toggle('active-mode', mode === 5);
    resetGame();
    
    // Update neuron count display
    const totalNeurons = players.length * players[0].brain.totalNeurons;
    document.getElementById('neuralInfo').textContent = 
        `Neural Network: ${players.length} players × ~${players[0].brain.totalNeurons} neurons = ~${totalNeurons} total neurons | Mode: ${mode}v${mode}`;
}

function cycleSpeed() {
    const speeds = [1, 2, 3, 5];
    const idx = speeds.indexOf(gameState.speed);
    gameState.speed = speeds[(idx + 1) % speeds.length];
    document.getElementById('btnSpeed').textContent = `Speed: ${gameState.speed}x`;
}

// ==================== INIT ====================
createPlayers();
resetBall(false);
gameLoop();

// Update neuron info
const totalNeurons = players.length * players[0].brain.totalNeurons;
document.getElementById('neuralInfo').textContent = 
    `Neural Network: ${players.length} players × ~${players[0].brain.totalNeurons} neurons = ~${totalNeurons} total neurons | Transformer architecture with multi-head attention`;
</script>
